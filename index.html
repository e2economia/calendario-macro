<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Macro 2026</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0e15;--s1:#121620;--s2:#1a2030;--s3:#222840;
  --bd:#2a3350;--bd2:#364060;
  --ac:#5b9cf6;--ac2:#f6c55b;--ac3:#5bf6a0;
  --tx:#dde3f5;--dim:#7080a8;--gh:#3a4570;
  --r:#f65b7a;--g:#5bf6a0;--p:#a07af6;--o:#f6955b;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:14px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

header{display:flex;align-items:center;gap:16px;padding:12px 22px;background:var(--s1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:90;flex-wrap:wrap}
.brand{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.16em;color:var(--ac);text-transform:uppercase;white-space:nowrap}
.brand span{color:var(--dim)}
.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex:1}
.fg{display:flex;align-items:center;gap:5px}
.fl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;white-space:nowrap}
select,input[type=date]{background:var(--s2);border:1px solid var(--bd);color:var(--tx);font-family:'IBM Plex Sans',sans-serif;font-size:12px;padding:5px 8px;border-radius:5px;outline:none;cursor:pointer;transition:border-color .15s}
select:focus,input[type=date]:focus{border-color:var(--ac)}
select option{background:var(--s2)}
.vtog{display:flex;gap:2px;background:var(--s2);border:1px solid var(--bd);border-radius:5px;padding:2px;margin-left:auto}
.vb{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:5px 14px;border-radius:3px;border:none;cursor:pointer;background:transparent;color:var(--dim);transition:all .15s}
.vb.on{background:var(--ac);color:#fff}
.bcl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:5px 10px;border-radius:5px;border:1px solid var(--bd);background:transparent;color:var(--dim);cursor:pointer;transition:all .15s}
.bcl:hover{border-color:var(--r);color:var(--r)}

.kbar{display:flex;gap:16px;padding:9px 22px;background:var(--s1);border-bottom:1px solid var(--bd);align-items:center;flex-wrap:wrap}
.kpi{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim)}
.kpi b{color:var(--ac2);font-size:14px;margin-right:3px}

.leg{display:flex;flex-wrap:wrap;gap:6px;padding:9px 22px;background:var(--s1);border-bottom:1px solid var(--bd)}
.li{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;cursor:pointer;padding:3px 7px;border-radius:4px;transition:all .15s;border:1px solid transparent}
.li:hover{background:var(--s2)}
.li.act{background:var(--s3);color:var(--tx);border-color:var(--bd2)}
.ld{width:7px;height:7px;border-radius:2px;flex-shrink:0}

main{padding:18px 22px}

/* MONTHLY */
.mb{margin-bottom:34px}
.mh{display:flex;align-items:baseline;gap:10px;margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid var(--bd)}
.mn{font-family:'IBM Plex Mono',monospace;font-size:18px;letter-spacing:.03em}
.my{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim)}
.mc{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--gh);margin-left:auto}
.dr{display:flex;gap:12px;margin-bottom:7px;align-items:flex-start}
.dl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);min-width:42px;padding-top:7px;text-align:right;flex-shrink:0;line-height:1.2}
.dl .wd{display:block;font-size:8px;color:var(--gh);text-transform:uppercase;letter-spacing:.07em}
.dt{width:1px;background:var(--bd);margin-top:8px;flex-shrink:0;align-self:stretch}
.de{display:flex;flex-wrap:wrap;gap:5px;flex:1}

.ec{background:var(--s1);border:1px solid var(--bd);border-left:3px solid #555;border-radius:5px;padding:6px 10px;cursor:pointer;transition:all .12s;min-width:165px;max-width:235px}
.ec:hover{background:var(--s2);border-color:var(--ac);transform:translateY(-1px);box-shadow:0 3px 14px rgba(91,156,246,.13)}
.en{font-size:11px;font-weight:500;line-height:1.3;margin-bottom:4px}
.em{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.tag{font-family:'IBM Plex Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:.06em;padding:1px 5px;border-radius:3px;background:var(--s2);color:var(--dim);border:1px solid var(--bd)}
.tag.tf{color:var(--ac);border-color:rgba(91,156,246,.28)}
.tt{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--gh)}

/* WEEKLY */
.wb{margin-bottom:26px}
.wh{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ac2);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px;padding:3px 0;border-bottom:1px solid var(--bd)}
.wg{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.wc{min-height:50px}
.wdh{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;padding:3px 5px;background:var(--s1);border-radius:3px;text-align:center}
.wdh.tod{color:var(--ac);background:rgba(91,156,246,.1)}
.we{border-left:2px solid #555;background:var(--s1);border-radius:3px;padding:4px 6px;margin-bottom:3px;cursor:pointer;transition:background .12s;font-size:10px}
.we:hover{background:var(--s2)}
.wen{color:var(--tx);line-height:1.3;margin-bottom:1px}
.wef{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--ac);text-transform:uppercase;letter-spacing:.05em}

.empty{text-align:center;padding:50px;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:12px}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:200;display:none;align-items:center;justify-content:center}
.ov.open{display:flex}
.md{background:var(--s1);border:1px solid var(--bd2);border-radius:10px;padding:24px;max-width:420px;width:90%;position:relative;box-shadow:0 20px 50px rgba(0,0,0,.55);animation:pop .18s cubic-bezier(.34,1.5,.64,1)}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.mcl{position:absolute;top:13px;right:13px;font-size:17px;color:var(--dim);cursor:pointer;background:none;border:none;line-height:1;padding:4px}
.mcl:hover{color:var(--tx)}
.mti{font-size:15px;font-weight:600;margin-bottom:14px;padding-right:22px;line-height:1.35}
.mr{display:flex;gap:8px;margin-bottom:9px;font-size:12px;align-items:baseline}
.mk{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;min-width:82px;flex-shrink:0}
.mv{color:var(--tx)}
.mln{display:inline-block;margin-top:11px;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--ac);text-decoration:none;border:1px solid rgba(91,156,246,.3);padding:4px 10px;border-radius:4px;transition:all .15s}
.mln:hover{background:rgba(91,156,246,.1)}
</style>
</head>
<body>

<header>
  <div class="brand">Calendário Macro <span>/ 2026</span></div>
  <div class="filters">
    <div class="fg"><span class="fl">De</span><input type="date" id="fFrom" value="2026-01-01"></div>
    <div class="fg"><span class="fl">Até</span><input type="date" id="fTo" value="2026-12-31"></div>
    <div class="fg"><span class="fl">Fonte</span><select id="fFonte"><option value="">Todas</option></select></div>
    <div class="fg"><span class="fl">Setor</span><select id="fSetor"><option value="">Todos</option></select></div>
    <button class="bcl" onclick="clearF()">Limpar</button>
    <div class="vtog">
      <button class="vb on" id="btnM" onclick="setView('m')">Mensal</button>
      <button class="vb" id="btnW" onclick="setView('w')">Semanal</button>
    </div>
  </div>
</header>

<div class="kbar">
  <div class="kpi"><b id="nE">0</b> eventos</div>
  <div class="kpi"><b id="nF">0</b> fontes</div>
  <div class="kpi"><b id="nS">0</b> setores</div>
</div>

<div class="leg" id="legend"></div>
<main id="main"></main>

<div class="ov" id="ov">
  <div class="md">
    <button class="mcl" id="mcl">&times;</button>
    <div class="mti" id="mT"></div>
    <div class="mr"><span class="mk">Data</span><span class="mv" id="mD"></span></div>
    <div class="mr"><span class="mk">Horário</span><span class="mv" id="mH"></span></div>
    <div class="mr"><span class="mk">Fonte</span><span class="mv" id="mF"></span></div>
    <div class="mr"><span class="mk">Setor</span><span class="mv" id="mS"></span></div>
    <div class="mr"><span class="mk">Referência</span><span class="mv" id="mP"></span></div>
    <div id="mL"></div>
  </div>
</div>

const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const COLORS={
  'Preços':'#f65b7a','Indústria':'#5b9cf6','Mercado de Trabalho':'#5bf6a0',
  'Consumo':'#f6c55b','Sondagens':'#a07af6','Atividade':'#5bf6d0',
  'Agropecuária':'#8ef65b','Fiscal':'#f6955b','Imobiliário':'#f65bf6',
  'Setor Externo':'#74a0f6','Confiança':'#c07af6','Construção':'#f6b55b',
  'Serviços':'#5bf6f0','Comércio':'#f66b5b','Energia':'#f6d55b',
  'Crédito':'#5bf6c0','Setor Público':'#f67b7b','Automotivo':'#a0c0f6','Habitação':'#f6a0c0'
};
const col = s => COLORS[s]||'#607090';

let view='m', filtered=[], activeSec='';

// Build index map: each event in filtered gets its RAW index
let filteredIdxs=[];

function init(){
  const fontes=[...new Set(RAW.map(d=>d.fonte))].sort();
  const setores=[...new Set(RAW.map(d=>d.setor).filter(Boolean))].sort();
  const fs=document.getElementById('fFonte');
  const ss=document.getElementById('fSetor');
  fontes.forEach(f=>{const o=document.createElement('option');o.value=f;o.textContent=f;fs.appendChild(o)});
  setores.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;ss.appendChild(o)});

  const leg=document.getElementById('legend');
  Object.keys(COLORS).forEach(s=>{
    const d=document.createElement('div');
    d.className='li';d.dataset.s=s;
    d.innerHTML='<div class="ld" style="background:'+COLORS[s]+'"></div>'+s;
    d.addEventListener('click',()=>clickSec(s));
    leg.appendChild(d);
  });

  ['fFonte','fSetor','fFrom','fTo'].forEach(id=>
    document.getElementById(id).addEventListener('change',applyF));

  document.getElementById('ov').addEventListener('click',function(e){
    if(e.target===this) this.classList.remove('open');
  });
  document.getElementById('mcl').addEventListener('click',function(){
    document.getElementById('ov').classList.remove('open');
  });

  applyF();
}

function clickSec(s){
  activeSec=activeSec===s?'':s;
  document.querySelectorAll('.li').forEach(el=>
    el.classList.toggle('act',el.dataset.s===activeSec));
  document.getElementById('fSetor').value=activeSec;
  applyF();
}

function applyF(){
  const fonte=document.getElementById('fFonte').value;
  const setor=document.getElementById('fSetor').value;
  const from=document.getElementById('fFrom').value;
  const to=document.getElementById('fTo').value;
  activeSec=setor;
  document.querySelectorAll('.li').forEach(el=>
    el.classList.toggle('act',el.dataset.s===setor&&setor!==''));

  filteredIdxs=[];
  filtered=[];
  RAW.forEach((d,i)=>{
    if(fonte&&d.fonte!==fonte)return;
    if(setor&&d.setor!==setor)return;
    if(from&&d.data<from)return;
    if(to&&d.data>to)return;
    filtered.push(d);
    filteredIdxs.push(i);
  });

  document.getElementById('nE').textContent=filtered.length;
  document.getElementById('nF').textContent=[...new Set(filtered.map(d=>d.fonte))].length;
  document.getElementById('nS').textContent=[...new Set(filtered.map(d=>d.setor).filter(Boolean))].length;
  render();
}

function clearF(){
  document.getElementById('fFonte').value='';
  document.getElementById('fSetor').value='';
  document.getElementById('fFrom').value='2026-01-01';
  document.getElementById('fTo').value='2026-12-31';
  activeSec='';
  document.querySelectorAll('.li').forEach(el=>el.classList.remove('act'));
  applyF();
}

function setView(v){
  view=v;
  document.getElementById('btnM').classList.toggle('on',v==='m');
  document.getElementById('btnW').classList.toggle('on',v==='w');
  render();
}

function render(){view==='m'?renderM():renderW()}

function renderM(){
  const main=document.getElementById('main');
  if(!filtered.length){main.innerHTML='<div class="empty">◌<br>Nenhum evento para os filtros selecionados</div>';return}

  // group by month, keeping RAW index
  const byMonth={};
  filtered.forEach((d,fi)=>{
    const k=d.data.slice(0,7);
    if(!byMonth[k])byMonth[k]=[];
    byMonth[k].push({d,ri:filteredIdxs[fi]});
  });

  const frag=document.createDocumentFragment();
  Object.keys(byMonth).sort().forEach(mk=>{
    const items=byMonth[mk];
    const [y,m]=mk.split('-');
    const byDay={};
    items.forEach(({d,ri})=>{
      if(!byDay[d.data])byDay[d.data]=[];
      byDay[d.data].push({d,ri});
    });

    const mbEl=document.createElement('div');
    mbEl.className='mb';

    const mhEl=document.createElement('div');
    mhEl.className='mh';
    mhEl.innerHTML='<span class="mn">'+MONTHS[parseInt(m)-1]+'</span><span class="my">'+y+'</span><span class="mc">'+items.length+' eventos</span>';
    mbEl.appendChild(mhEl);

    Object.keys(byDay).sort().forEach(ds=>{
      const dt=new Date(ds+'T12:00:00');
      const dr=document.createElement('div');dr.className='dr';
      const dl=document.createElement('div');dl.className='dl';
      dl.innerHTML=dt.getDate().toString().padStart(2,'0')+'<span class="wd">'+DAYS[dt.getDay()]+'</span>';
      const dtEl=document.createElement('div');dtEl.className='dt';
      const de=document.createElement('div');de.className='de';
      byDay[ds].forEach(({d,ri})=>de.appendChild(makeCard(d,ri)));
      dr.appendChild(dl);dr.appendChild(dtEl);dr.appendChild(de);
      mbEl.appendChild(dr);
    });
    frag.appendChild(mbEl);
  });
  main.innerHTML='';
  main.appendChild(frag);
}

function makeCard(d,ri){
  const el=document.createElement('div');
  el.className='ec';
  el.style.borderLeftColor=col(d.setor);
  el.innerHTML='<div class="en">'+esc(d.indicador)+'</div><div class="em"><span class="tag tf">'+esc(d.fonte)+'</span>'+(d.setor?'<span class="tag">'+esc(d.setor)+'</span>':'')+(d.horario?'<span class="tt">'+esc(d.horario)+'</span>':'')+'</div>';
  el.addEventListener('click',()=>showMd(ri));
  return el;
}

function renderW(){
  const main=document.getElementById('main');
  if(!filtered.length){main.innerHTML='<div class="empty">◌<br>Nenhum evento para os filtros selecionados</div>';return}

  const byWeek={};
  filtered.forEach((d,fi)=>{
    const dt=new Date(d.data+'T12:00:00');
    const wk=isoWeek(dt);
    const k=dt.getFullYear()+'-'+String(wk).padStart(2,'0');
    if(!byWeek[k])byWeek[k]={};
    const dow=dt.getDay();
    if(!byWeek[k][dow])byWeek[k][dow]=[];
    byWeek[k][dow].push({d,ri:filteredIdxs[fi]});
  });

  const today=new Date().toISOString().slice(0,10);
  const frag=document.createDocumentFragment();

  Object.keys(byWeek).sort().forEach(wk=>{
    const days=byWeek[wk];
    const [yr,wn]=wk.split('-');
    const mon=mondayOf(parseInt(yr),parseInt(wn));
    const fri=new Date(mon);fri.setDate(mon.getDate()+4);
    const wb=document.createElement('div');wb.className='wb';
    const whEl=document.createElement('div');whEl.className='wh';
    whEl.textContent='Semana '+wn+' — '+fd(mon)+' a '+fd(fri);
    wb.appendChild(whEl);
    const wg=document.createElement('div');wg.className='wg';
    for(let dow=1;dow<=5;dow++){
      const dt2=new Date(mon);dt2.setDate(mon.getDate()+(dow-1));
      const ds=dt2.toISOString().slice(0,10);
      const wc=document.createElement('div');wc.className='wc';
      const wdh=document.createElement('div');
      wdh.className='wdh'+(ds===today?' tod':'');
      wdh.textContent=DAYS[dow]+' '+dt2.getDate().toString().padStart(2,'0')+'/'+(dt2.getMonth()+1).toString().padStart(2,'0');
      wc.appendChild(wdh);
      (days[dow]||[]).forEach(({d,ri})=>{
        const we=document.createElement('div');
        we.className='we';we.style.borderLeftColor=col(d.setor);
        we.innerHTML='<div class="wen">'+esc(d.indicador)+'</div><div class="wef">'+esc(d.fonte)+(d.horario?' · '+d.horario:'')+'</div>';
        we.addEventListener('click',()=>showMd(ri));
        wc.appendChild(we);
      });
      wg.appendChild(wc);
    }
    wb.appendChild(wg);
    frag.appendChild(wb);
  });
  main.innerHTML='';
  main.appendChild(frag);
}

function showMd(ri){
  const d=RAW[ri];
  const dt=new Date(d.data+'T12:00:00');
  const fmt=dt.getDate().toString().padStart(2,'0')+'/'+(dt.getMonth()+1).toString().padStart(2,'0')+'/'+dt.getFullYear()+' — '+DAYS[dt.getDay()];
  let per='—';
  if(d.periodo&&d.periodo!=='NaT'){
    try{const pd=new Date(d.periodo+'T12:00:00');per=MONTHS[pd.getMonth()]+'/'+pd.getFullYear()}catch(e){}
  }
  document.getElementById('mT').textContent=d.indicador;
  document.getElementById('mD').textContent=fmt;
  document.getElementById('mH').textContent=d.horario||'—';
  document.getElementById('mF').textContent=d.fonte;
  document.getElementById('mS').textContent=d.setor||'—';
  document.getElementById('mP').textContent=per;
  const mL=document.getElementById('mL');
  if(d.link){
    const a=document.createElement('a');
    a.className='mln';a.href=d.link;a.target='_blank';a.rel='noopener';
    a.textContent='↗ Ver fonte oficial';
    mL.innerHTML='';mL.appendChild(a);
  } else {mL.innerHTML='';}
  document.getElementById('ov').classList.add('open');
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function isoWeek(d){
  const date=new Date(d);date.setHours(0,0,0,0);
  date.setDate(date.getDate()+3-(date.getDay()+6)%7);
  const w1=new Date(date.getFullYear(),0,4);
  return 1+Math.round(((date-w1)/864e5-3+(w1.getDay()+6)%7)/7);
}
function mondayOf(y,w){
  const s=new Date(y,0,1+(w-1)*7);
  const dow=s.getDay();const m=new Date(s);
  if(dow<=4)m.setDate(s.getDate()-s.getDay()+1);
  else m.setDate(s.getDate()+8-s.getDay());
  return m;
}
function fd(d){return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')}

init();
</script>
