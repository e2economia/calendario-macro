<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário Macro 2026 — E2+</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* E2+ identity palette */
  --bg:      #0a1220;
  --s1:      #0f1c2e;
  --s2:      #132440;
  --s3:      #1a2e50;
  --bd:      #1e3050;
  --bd2:     #2a4070;
  --e2red:   #CC2229;
  --gold:    #D4A843;
  --ac:      #4a8fd4;
  --ac-lt:   #6aaee8;
  --tx:      #e8eef8;
  --dim:     #7a90b8;
  --gh:      #364870;
  --g:       #4fd48a;
  --warn:    #e8943a;
  --warn-lt: #f5b060;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:15px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* ── HEADER ── */
header{
  display:flex;align-items:center;gap:18px;padding:11px 24px;
  background:var(--s1);border-bottom:2px solid var(--e2red);
  position:sticky;top:0;z-index:90;flex-wrap:wrap;
}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo-img{height:34px;width:auto;border-radius:4px}
.brand-sep{width:1px;height:26px;background:var(--bd2)}
.brand{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.16em;
  color:var(--ac-lt);text-transform:uppercase;white-space:nowrap;font-weight:500}
.brand span{color:var(--dim)}

.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex:1}
.fg{display:flex;align-items:center;gap:6px}
.fl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;
  color:var(--dim);text-transform:uppercase;white-space:nowrap}
select,input[type=date]{
  background:var(--s2);border:1px solid var(--bd2);color:var(--tx);
  font-family:'IBM Plex Sans',sans-serif;font-size:13px;
  padding:5px 9px;border-radius:5px;outline:none;cursor:pointer;
  transition:border-color .15s;
}
select:focus,input[type=date]:focus{border-color:var(--ac)}
select option{background:var(--s2)}

.vtog{display:flex;gap:2px;background:var(--s2);border:1px solid var(--bd2);
  border-radius:6px;padding:2px;margin-left:auto}
.vb{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;
  text-transform:uppercase;padding:5px 16px;border-radius:4px;border:none;
  cursor:pointer;background:transparent;color:var(--dim);transition:all .15s}
.vb.on{background:var(--e2red);color:#fff;font-weight:500}

.bcl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;
  text-transform:uppercase;padding:5px 10px;border-radius:5px;
  border:1px solid var(--bd2);background:transparent;color:var(--dim);
  cursor:pointer;transition:all .15s}
.bcl:hover{border-color:var(--e2red);color:var(--e2red)}

/* ── UPDATE BAR ── */
.ubar{display:flex;align-items:center;gap:10px;padding:6px 24px;
  background:rgba(74,143,212,.06);border-bottom:1px solid rgba(74,143,212,.15);
  font-size:11px;color:var(--dim);font-family:'IBM Plex Mono',monospace}
.ubar span{color:var(--ac-lt)}
.ubar.ok{background:rgba(79,212,138,.05);border-color:rgba(79,212,138,.15)}
.ubar.err{background:rgba(204,34,41,.07);border-color:rgba(204,34,41,.2)}

/* ── KPI BAR ── */
.kbar{display:flex;gap:20px;padding:10px 24px;
  background:var(--s1);border-bottom:1px solid var(--bd);
  align-items:center;flex-wrap:wrap}
.kpi{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);
  display:flex;align-items:center;gap:5px}
.kpi b{color:var(--gold);font-size:16px}
.kpi-est{font-family:'IBM Plex Mono',monospace;font-size:12px;
  color:var(--warn-lt);display:flex;align-items:center;gap:6px}
.kpi-est b{color:var(--warn-lt);font-size:16px}
.est-kpi-icon{font-size:15px;line-height:1}

/* ── LEGEND ── */
.leg{display:flex;flex-wrap:wrap;gap:6px;padding:9px 24px;
  background:var(--s1);border-bottom:1px solid var(--bd)}
.li{display:flex;align-items:center;gap:5px;
  font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);
  text-transform:uppercase;letter-spacing:.07em;cursor:pointer;
  padding:3px 8px;border-radius:4px;transition:all .15s;
  border:1px solid transparent}
.li:hover{background:var(--s2)}
.li.act{background:var(--s3);color:var(--tx);border-color:var(--bd2)}
.ld{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── MAIN ── */
main{padding:20px 24px}

/* ── MONTHLY ── */
.mb{margin-bottom:36px}
.mh{display:flex;align-items:baseline;gap:12px;margin-bottom:13px;
  padding-bottom:8px;border-bottom:1px solid var(--bd)}
.mn{font-family:'IBM Plex Mono',monospace;font-size:20px;
  letter-spacing:.03em;color:var(--tx);font-weight:500}
.my{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim)}
.mc{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gh);margin-left:auto}

.dr{display:flex;gap:14px;margin-bottom:8px;align-items:flex-start}
.dl{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);
  min-width:44px;padding-top:8px;text-align:right;flex-shrink:0;line-height:1.2}
.dl .wd{display:block;font-size:9px;color:var(--gh);
  text-transform:uppercase;letter-spacing:.07em}
.dtick{width:1px;background:var(--bd);margin-top:9px;flex-shrink:0;align-self:stretch}
.de{display:flex;flex-wrap:wrap;gap:6px;flex:1}

/* ── EVENT CARD ── */
.ec{background:var(--s1);border:1px solid var(--bd);border-left:3px solid #555;
  border-radius:6px;padding:8px 11px;cursor:pointer;transition:all .12s;
  min-width:175px;max-width:250px;position:relative}
.ec:hover{background:var(--s2);border-color:var(--ac);
  transform:translateY(-1px);box-shadow:0 4px 16px rgba(74,143,212,.15)}
.ec.estimated{background:rgba(232,148,58,.05);border-color:rgba(232,148,58,.3)}
.ec.estimated:hover{border-color:var(--warn)}

.en{font-size:12px;font-weight:500;line-height:1.35;margin-bottom:5px;padding-right:22px}
.em{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.tag{font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;
  letter-spacing:.06em;padding:2px 6px;border-radius:3px;
  background:var(--s2);color:var(--dim);border:1px solid var(--bd)}
.tag.tf{color:var(--ac-lt);border-color:rgba(74,143,212,.3)}
.tt{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--gh)}

/* estimated icon on card */
.est-icon{
  position:absolute;top:7px;right:8px;
  font-size:15px;line-height:1;cursor:help;
  filter:drop-shadow(0 0 4px rgba(232,148,58,.5));
}
.est-tip{
  display:none;position:absolute;top:26px;right:0;
  background:var(--s3);border:1px solid rgba(232,148,58,.4);
  border-radius:4px;padding:4px 9px;
  font-size:9px;font-family:'IBM Plex Mono',monospace;
  color:var(--warn-lt);white-space:nowrap;z-index:20;
  letter-spacing:.08em;text-transform:uppercase;
}
.est-icon:hover ~ .est-tip{display:block}

/* ── WEEKLY ── */
.wb{margin-bottom:28px}
.wh{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold);
  text-transform:uppercase;letter-spacing:.12em;margin-bottom:9px;
  padding:4px 0;border-bottom:1px solid var(--bd);font-weight:500}
.wg{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.wc{min-height:60px}
.wdh{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;
  padding:4px 6px;background:var(--s2);border-radius:4px;text-align:center;
  font-weight:500}
.wdh.tod{color:var(--ac-lt);background:rgba(74,143,212,.12);border:1px solid rgba(74,143,212,.2)}

.we{border-left:2px solid #555;background:var(--s1);border-radius:4px;
  padding:5px 7px;margin-bottom:4px;cursor:pointer;
  transition:background .12s;font-size:11px;position:relative}
.we:hover{background:var(--s2)}
.we.estimated{background:rgba(232,148,58,.06);border-left-color:var(--warn) !important}
.wen{color:var(--tx);line-height:1.35;margin-bottom:2px;padding-right:18px;font-weight:500}
.wef{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ac-lt);
  text-transform:uppercase;letter-spacing:.05em}
.we-est{position:absolute;top:5px;right:6px;font-size:13px;line-height:1;
  filter:drop-shadow(0 0 3px rgba(232,148,58,.5))}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:60px;color:var(--dim);
  font-family:'IBM Plex Mono',monospace;font-size:13px}
.loading{text-align:center;padding:60px;color:var(--dim);
  font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.1em}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(5,12,22,.75);
  backdrop-filter:blur(8px);z-index:200;display:none;
  align-items:center;justify-content:center}
.ov.open{display:flex}
.md{background:var(--s1);border:1px solid var(--bd2);
  border-top:3px solid var(--e2red);
  border-radius:10px;padding:26px;max-width:440px;width:90%;
  position:relative;box-shadow:0 24px 60px rgba(0,0,0,.6);
  animation:pop .18s cubic-bezier(.34,1.5,.64,1)}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.mcl{position:absolute;top:14px;right:14px;font-size:18px;
  color:var(--dim);cursor:pointer;background:none;border:none;
  line-height:1;padding:4px;transition:color .15s}
.mcl:hover{color:var(--tx)}
.mti{font-size:16px;font-weight:600;margin-bottom:8px;
  padding-right:24px;line-height:1.35;color:var(--tx)}
.mest{display:inline-flex;align-items:center;gap:6px;
  font-family:'IBM Plex Mono',monospace;font-size:10px;
  color:var(--warn-lt);background:rgba(232,148,58,.1);
  border:1px solid rgba(232,148,58,.35);
  padding:3px 10px;border-radius:4px;margin-bottom:14px;
  text-transform:uppercase;letter-spacing:.1em;font-weight:500}
.mr{display:flex;gap:10px;margin-bottom:10px;font-size:13px;align-items:baseline}
.mk{font-family:'IBM Plex Mono',monospace;font-size:10px;
  color:var(--dim);text-transform:uppercase;letter-spacing:.1em;
  min-width:88px;flex-shrink:0}
.mv{color:var(--tx)}
.mnota{color:var(--dim);font-style:italic;font-size:12px}
.mln{display:inline-block;margin-top:12px;font-size:11px;
  font-family:'IBM Plex Mono',monospace;color:var(--ac-lt);
  text-decoration:none;border:1px solid rgba(74,143,212,.3);
  padding:5px 12px;border-radius:5px;transition:all .15s}
.mln:hover{background:rgba(74,143,212,.1);border-color:var(--ac)}
</style>
</head>

<script>
const JSON_URL = 'calendario_2026.json';
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const COLORS={
  'Preços':'#e85c6e','Indústria':'#4a8fd4','Mercado de Trabalho':'#4fd48a',
  'Consumo':'#D4A843','Sondagens':'#9070e8','Atividade':'#4dd4c0',
  'Agropecuária':'#7dd44a','Fiscal':'#e8943a','Imobiliário':'#d44ad4',
  'Setor Externo':'#5a9ee8','Confiança':'#b07ae8','Construção':'#e8b43a',
  'Serviços':'#4ad4e8','Comércio':'#e85a4a','Energia':'#e8d04a',
  'Crédito':'#4ae8b0','Setor Público':'#e87070','Automotivo':'#90b8e8','Habitação':'#e890b8'
};
const col = s => COLORS[s]||'#5a7090';

let RAW=[], view='w', filtered=[], filteredIdxs=[], activeSec='';

function getMondayOfWeek(){
  const d=new Date();
  const day=d.getDay();
  const diff=day===0?-6:1-day;
  const mon=new Date(d);
  mon.setDate(d.getDate()+diff);
  return mon.toISOString().slice(0,10);
}

async function loadData(){
  const ubar=document.getElementById('ubar');
  try{
    const res=await fetch(JSON_URL+'?v='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    RAW=await res.json();
    const ts=new Date().toLocaleString('pt-BR');
    ubar.className='ubar ok';
    ubar.innerHTML='✓ Dados carregados &nbsp;|&nbsp; <span>'+RAW.length+' registros</span> &nbsp;|&nbsp; '+ts;
    init();
  }catch(e){
    ubar.className='ubar err';
    ubar.innerHTML='⚠ Erro ao carregar dados: '+e.message;
    document.getElementById('main').innerHTML='<div class="empty">⚠ Não foi possível carregar calendario_2026.json<br><br>Verifique se o arquivo está no repositório GitHub.</div>';
  }
}

function init(){
  const fontes=[...new Set(RAW.map(d=>d.fonte))].sort();
  const setores=[...new Set(RAW.map(d=>d.setor).filter(Boolean))].sort();
  const fs=document.getElementById('fFonte');
  const ss=document.getElementById('fSetor');
  fs.innerHTML='<option value="">Todas</option>';
  ss.innerHTML='<option value="">Todos</option>';
  fontes.forEach(f=>{const o=document.createElement('option');o.value=f;o.textContent=f;fs.appendChild(o)});
  setores.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;ss.appendChild(o)});

  document.getElementById('fFrom').value=getMondayOfWeek();

  const leg=document.getElementById('legend');
  leg.innerHTML='';
  Object.keys(COLORS).forEach(s=>{
    const d=document.createElement('div');
    d.className='li';d.dataset.s=s;
    d.innerHTML='<div class="ld" style="background:'+COLORS[s]+'"></div>'+s;
    d.addEventListener('click',()=>clickSec(s));
    leg.appendChild(d);
  });

  ['fFonte','fSetor','fFrom','fTo'].forEach(id=>
    document.getElementById(id).addEventListener('change',applyF));
  document.getElementById('ov').addEventListener('click',function(e){
    if(e.target===this)this.classList.remove('open');
  });
  document.getElementById('mcl').addEventListener('click',()=>
    document.getElementById('ov').classList.remove('open'));

  applyF();
}

function isEst(d){return d.nota&&d.nota.toLowerCase().includes('estimativa')}

function clickSec(s){
  activeSec=activeSec===s?'':s;
  document.querySelectorAll('.li').forEach(el=>el.classList.toggle('act',el.dataset.s===activeSec));
  document.getElementById('fSetor').value=activeSec;
  applyF();
}

function applyF(){
  const fonte=document.getElementById('fFonte').value;
  const setor=document.getElementById('fSetor').value;
  const from=document.getElementById('fFrom').value;
  const to=document.getElementById('fTo').value;
  activeSec=setor;
  document.querySelectorAll('.li').forEach(el=>el.classList.toggle('act',el.dataset.s===setor&&setor!==''));
  filteredIdxs=[];filtered=[];
  RAW.forEach((d,i)=>{
    if(fonte&&d.fonte!==fonte)return;
    if(setor&&d.setor!==setor)return;
    if(from&&d.data<from)return;
    if(to&&d.data>to)return;
    filtered.push(d);filteredIdxs.push(i);
  });
  document.getElementById('nE').textContent=filtered.length;
  document.getElementById('nF').textContent=[...new Set(filtered.map(d=>d.fonte))].length;
  document.getElementById('nS').textContent=[...new Set(filtered.map(d=>d.setor).filter(Boolean))].length;
  document.getElementById('nEst').textContent=filtered.filter(d=>isEst(d)).length;
  render();
}

function clearF(){
  document.getElementById('fFonte').value='';
  document.getElementById('fSetor').value='';
  document.getElementById('fFrom').value=getMondayOfWeek();
  document.getElementById('fTo').value='2026-12-31';
  activeSec='';
  document.querySelectorAll('.li').forEach(el=>el.classList.remove('act'));
  applyF();
}

function setView(v){
  view=v;
  document.getElementById('btnM').classList.toggle('on',v==='m');
  document.getElementById('btnW').classList.toggle('on',v==='w');
  render();
}

function render(){view==='m'?renderM():renderW()}

function renderM(){
  const main=document.getElementById('main');
  if(!filtered.length){main.innerHTML='<div class="empty">◌<br>Nenhum evento para os filtros selecionados</div>';return}
  const byMonth={};
  filtered.forEach((d,fi)=>{
    const k=d.data.slice(0,7);
    if(!byMonth[k])byMonth[k]=[];
    byMonth[k].push({d,ri:filteredIdxs[fi]});
  });
  const frag=document.createDocumentFragment();
  Object.keys(byMonth).sort().forEach(mk=>{
    const items=byMonth[mk];
    const[y,m]=mk.split('-');
    const byDay={};
    items.forEach(({d,ri})=>{if(!byDay[d.data])byDay[d.data]=[];byDay[d.data].push({d,ri})});
    const mbEl=document.createElement('div');mbEl.className='mb';
    const mhEl=document.createElement('div');mhEl.className='mh';
    mhEl.innerHTML='<span class="mn">'+MONTHS[parseInt(m)-1]+'</span><span class="my">'+y+'</span><span class="mc">'+items.length+' eventos</span>';
    mbEl.appendChild(mhEl);
    Object.keys(byDay).sort().forEach(ds=>{
      const dt=new Date(ds+'T12:00:00');
      const dr=document.createElement('div');dr.className='dr';
      const dl=document.createElement('div');dl.className='dl';
      dl.innerHTML=dt.getDate().toString().padStart(2,'0')+'<span class="wd">'+DAYS[dt.getDay()]+'</span>';
      const dtEl=document.createElement('div');dtEl.className='dtick';
      const de=document.createElement('div');de.className='de';
      byDay[ds].forEach(({d,ri})=>de.appendChild(makeCard(d,ri)));
      dr.appendChild(dl);dr.appendChild(dtEl);dr.appendChild(de);
      mbEl.appendChild(dr);
    });
    frag.appendChild(mbEl);
  });
  main.innerHTML='';main.appendChild(frag);
}

function makeCard(d,ri){
  const est=isEst(d);
  const el=document.createElement('div');
  el.className='ec'+(est?' estimated':'');
  el.style.borderLeftColor=est?'var(--warn)':col(d.setor);
  let inner='<div class="en">'+esc(d.indicador)+'</div>';
  if(est) inner+='<span class="est-icon" title="'+esc(d.nota)+'">⚠️</span><span class="est-tip">Estimado</span>';
  inner+='<div class="em"><span class="tag tf">'+esc(d.fonte)+'</span>'+(d.setor?'<span class="tag">'+esc(d.setor)+'</span>':'')+(d.horario?'<span class="tt">'+esc(d.horario)+'</span>':'')+'</div>';
  el.innerHTML=inner;
  el.addEventListener('click',()=>showMd(ri));
  return el;
}

function renderW(){
  const main=document.getElementById('main');
  if(!filtered.length){main.innerHTML='<div class="empty">◌<br>Nenhum evento para os filtros selecionados</div>';return}
  const byWeek={};
  filtered.forEach((d,fi)=>{
    const dt=new Date(d.data+'T12:00:00');
    const wk=isoWeek(dt);
    const k=dt.getFullYear()+'-'+String(wk).padStart(2,'0');
    if(!byWeek[k])byWeek[k]={};
    const dow=dt.getDay();
    if(!byWeek[k][dow])byWeek[k][dow]=[];
    byWeek[k][dow].push({d,ri:filteredIdxs[fi]});
  });
  const today=new Date().toISOString().slice(0,10);
  const frag=document.createDocumentFragment();
  Object.keys(byWeek).sort().forEach(wk=>{
    const days=byWeek[wk];
    const[yr,wn]=wk.split('-');
    const mon=mondayOf(parseInt(yr),parseInt(wn));
    const fri=new Date(mon);fri.setDate(mon.getDate()+4);
    const wb=document.createElement('div');wb.className='wb';
    const whEl=document.createElement('div');whEl.className='wh';
    whEl.textContent='Semana '+wn+' — '+fd(mon)+' a '+fd(fri);
    wb.appendChild(whEl);
    const wg=document.createElement('div');wg.className='wg';
    for(let dow=1;dow<=5;dow++){
      const dt2=new Date(mon);dt2.setDate(mon.getDate()+(dow-1));
      const ds=dt2.toISOString().slice(0,10);
      const wc=document.createElement('div');wc.className='wc';
      const wdh=document.createElement('div');
      wdh.className='wdh'+(ds===today?' tod':'');
      wdh.textContent=DAYS[dow]+' '+dt2.getDate().toString().padStart(2,'0')+'/'+(dt2.getMonth()+1).toString().padStart(2,'0');
      wc.appendChild(wdh);
      (days[dow]||[]).forEach(({d,ri})=>{
        const est=isEst(d);
        const we=document.createElement('div');
        we.className='we'+(est?' estimated':'');
        we.style.borderLeftColor=est?'var(--warn)':col(d.setor);
        we.innerHTML='<div class="wen">'+esc(d.indicador)+(est?'<span class="we-est" title="'+esc(d.nota)+'">⚠️</span>':'')+'</div><div class="wef">'+esc(d.fonte)+(d.horario?' · '+d.horario:'')+'</div>';
        we.addEventListener('click',()=>showMd(ri));
        wc.appendChild(we);
      });
      wg.appendChild(wc);
    }
    wb.appendChild(wg);
    frag.appendChild(wb);
  });
  main.innerHTML='';main.appendChild(frag);
}

function showMd(ri){
  const d=RAW[ri];
  const dt=new Date(d.data+'T12:00:00');
  const fmt=dt.getDate().toString().padStart(2,'0')+'/'+(dt.getMonth()+1).toString().padStart(2,'0')+'/'+dt.getFullYear()+' — '+DAYS[dt.getDay()];
  let per='—';
  if(d.periodo&&d.periodo!=='NaT'){
    try{const pd=new Date(d.periodo+'T12:00:00');per=MONTHS[pd.getMonth()]+'/'+pd.getFullYear()}catch(e){}
  }
  document.getElementById('mT').textContent=d.indicador;
  document.getElementById('mD').textContent=fmt;
  document.getElementById('mH').textContent=d.horario||'—';
  document.getElementById('mF').textContent=d.fonte;
  document.getElementById('mS').textContent=d.setor||'—';
  document.getElementById('mP').textContent=per;
  const badgeEl=document.getElementById('mEstBadge');
  badgeEl.innerHTML=isEst(d)?'<div class="mest">⚠️ ESTIMADO</div>':'';
  const notaRow=document.getElementById('mNotaRow');
  const notaEl=document.getElementById('mNota');
  if(d.nota&&d.nota.trim()&&!isEst(d)){
    notaEl.textContent=d.nota;notaRow.style.display='flex';
  }else{notaRow.style.display='none';}
  const mL=document.getElementById('mL');
  if(d.link){
    const a=document.createElement('a');
    a.className='mln';a.href=d.link;a.target='_blank';a.rel='noopener';
    a.textContent='↗ Ver fonte oficial';
    mL.innerHTML='';mL.appendChild(a);
  }else{mL.innerHTML='';}
  document.getElementById('ov').classList.add('open');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function isoWeek(d){
  const date=new Date(d);date.setHours(0,0,0,0);
  date.setDate(date.getDate()+3-(date.getDay()+6)%7);
  const w1=new Date(date.getFullYear(),0,4);
  return 1+Math.round(((date-w1)/864e5-3+(w1.getDay()+6)%7)/7);
}
function mondayOf(y,w){
  const s=new Date(y,0,1+(w-1)*7);const dow=s.getDay();const m=new Date(s);
  if(dow<=4)m.setDate(s.getDate()-s.getDay()+1);else m.setDate(s.getDate()+8-s.getDay());
  return m;
}
function fd(d){return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')}

loadData();
</script>
